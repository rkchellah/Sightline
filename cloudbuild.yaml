steps:
  # Step 1 — Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/sightline-backend/sightline-backend'
      - '.'
    dir: 'backend'

  # Step 2 — Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/sightline-backend/sightline-backend'

  # Step 3 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sightline-backend'
      - '--image=us-east4-docker.pkg.dev/$PROJECT_ID/sightline-backend/sightline-backend'
      - '--region=us-east4'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--timeout=300'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/sightline-backend/sightline-backend'