steps:
  # ── BACKEND ──────────────────────────────────────────────────────────────

  # Step 1 — Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-backend:latest'
      - '.'
    dir: 'backend'

  # Step 2 — Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-backend:latest'

  # Step 3 — Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sightline-backend'
      - '--image=us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-backend:latest'
      - '--region=us-east4'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--timeout=300'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-east4'

  # ── FRONTEND ─────────────────────────────────────────────────────────────

  # Step 4 — Build frontend image with WS URL baked in at build time
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_WS_URL=wss://sightline-backend-59597652459.us-east4.run.app/ws'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-frontend:latest'
      - '.'
    dir: 'frontend'

  # Step 5 — Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-frontend:latest'

  # Step 6 — Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sightline-frontend'
      - '--image=us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-frontend:latest'
      - '--region=us-east4'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'

images:
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-backend:latest'
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sightline-frontend:latest'